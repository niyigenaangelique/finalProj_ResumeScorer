<!DOCTYPE html>
<html>
<head>
    <title>Tracking Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        input, button { padding: 10px; margin: 5px; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Tracking Application Test</h1>
    
    <div>
        <input type="email" id="testEmail" placeholder="Enter email (e.g., angelbrenna20@gmail.com)" value="angelbrenna20@gmail.com">
        <button onclick="testTracking()">Test Tracking</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        async function testTracking() {
            const email = document.getElementById('testEmail').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!email) {
                resultsDiv.innerHTML = '<div class="test-result error">Please enter an email</div>';
                return;
            }
            
            resultsDiv.innerHTML = '<div class="test-result">Testing...</div>';
            
            try {
                const response = await fetch(`http://localhost:8005/applications-by-email?email=${encodeURIComponent(email)}`);
                const data = await response.json();
                
                if (response.ok) {
                    if (data.length === 0) {
                        resultsDiv.innerHTML = `<div class="test-result success">No applications found for ${email}</div>`;
                    } else {
                        let html = `<div class="test-result success">Found ${data.length} applications for ${email}:</div>`;
                        data.forEach((app, index) => {
                            html += `<div class="test-result">
                                <strong>Application ${index + 1}:</strong><br>
                                Job: ${app.job_title}<br>
                                Status: ${app.status}<br>
                                Department: ${app.department}<br>
                                Resume Score: ${app.resume_score || 'N/A'}<br>
                                Interview: ${app.interview_status || 'N/A'}<br>
                                Offer: ${app.offer_status || 'N/A'}
                            </div>`;
                        });
                        resultsDiv.innerHTML = html;
                    }
                } else {
                    resultsDiv.innerHTML = `<div class="test-result error">Error: ${response.status} - ${data.error || 'Unknown error'}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="test-result error">Network error: ${error.message}</div>`;
            }
        }
        
        // Test on page load
        window.onload = function() {
            testTracking();
        };
    </script>
</body>
</html>
